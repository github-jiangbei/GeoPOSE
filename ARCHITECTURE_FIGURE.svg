<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="denoiserGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd29a"/>
      <stop offset="50%" stop-color="#e5c3ff"/>
      <stop offset="100%" stop-color="#bfd7ff"/>
    </linearGradient>
    <linearGradient id="geoGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#ffe1a8"/>
      <stop offset="100%" stop-color="#bfe7dc"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#d7c5ff"/>
      <stop offset="100%" stop-color="#bde6ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1f2937" flood-opacity="0.18"/>
