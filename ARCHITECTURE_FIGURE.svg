    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #fbfbfe; }
      .title { font: 700 30px Arial, sans-serif; fill: #5b32b4; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #4b5563; }
      .panel { fill: #ffffff; stroke: #8b8f99; stroke-width: 2; rx: 12; filter: url(#shadow); }
      .panelTitle { font: 700 18px Arial, sans-serif; fill: #111827; }
      .smallTitle { font: 700 15px Arial, sans-serif; fill: #111827; }
      .label { font: 600 13px Arial, sans-serif; fill: #1f2937; }
      .tiny { font: 500 11px Arial, sans-serif; fill: #374151; }
      .code { font: 600 11px Consolas, monospace; fill: #111827; }
      .box { fill: #eef4ff; stroke: #64748b; stroke-width: 1.6; rx: 8; }
      .boxWarm { fill: #fff3df; stroke: #f59e0b; stroke-width: 1.6; rx: 8; }
      .boxGreen { fill: #e7f7ef; stroke: #22a06b; stroke-width: 1.6; rx: 8; }
      .boxPink { fill: #fff0f7; stroke: #d946ef; stroke-width: 1.6; rx: 8; }
      .boxViolet { fill: #f1ecff; stroke: #7c3aed; stroke-width: 1.6; rx: 8; }
      .module { fill: #dbeafe; stroke: #475569; stroke-width: 1.7; rx: 8; }
      .moduleHot { fill: url(#denoiserGrad); stroke: #6b7280; stroke-width: 1.8; rx: 10; }
      .arrow { stroke: #4b5563; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 2.2; fill: none; marker-end: url(#arrowPurple); }
      .dash { stroke-dasharray: 6 5; }
      .tokenOrange { fill: #ffb36b; stroke: #ea580c; stroke-width: 1.4; rx: 5; }
      .tokenYellow { fill: #ffe071; stroke: #d97706; stroke-width: 1.4; rx: 5; }
      .tokenGreen { fill: #a7e7a4; stroke: #16a34a; stroke-width: 1.4; rx: 5; }
      .tokenBlue { fill: #9fd0ff; stroke: #2563eb; stroke-width: 1.4; rx: 5; }
      .tokenViolet { fill: #c7a7ff; stroke: #7c3aed; stroke-width: 1.4; rx: 5; }
      .tokenGray { fill: #f3f4f6; stroke: #6b7280; stroke-width: 1.2; rx: 5; }
